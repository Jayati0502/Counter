<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>aaaru · counter</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;1,300&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090f;--bg2:#0e0e18;--bg3:#13131f;
  --surface:#161622;--surface2:#1c1c2e;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f0eef8;--text2:#9a96b4;--text3:#5a5770;
  --gold:#d4a853;--gold2:#f0c870;
  --teal:#3ecfb2;--rose:#e0607a;--violet:#8b6fe8;--violet2:#b39df5;
  --r:20px;--r-sm:12px;
}
html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;overflow-x:hidden}
#bgc{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.55}
body::before{content:'';position:fixed;inset:0;z-index:1;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;opacity:0.7}
.wrap{position:relative;z-index:2;max-width:980px;margin:0 auto;padding:0 20px 100px}

/* NAV */
.nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:64px;background:rgba(9,9,15,0.82);backdrop-filter:blur(24px);border-bottom:1px solid var(--border)}
.brand{font-family:'Playfair Display',serif;font-size:24px;font-weight:300;letter-spacing:-0.5px;display:flex;align-items:center;gap:8px}
.bdot{width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:0 0 14px var(--gold),0 0 28px rgba(212,168,83,0.4);animation:pdot 2.5s ease-in-out infinite}
@keyframes pdot{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(0.7);opacity:0.5}}
.nav-tabs{display:flex;gap:4px}
.ntab{padding:7px 18px;border-radius:30px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:13px;font-family:'Outfit',sans-serif;cursor:pointer;transition:all 0.25s;letter-spacing:0.02em}
.ntab:hover{background:var(--surface2);color:var(--text)}
.ntab.active{background:linear-gradient(135deg,rgba(212,168,83,0.18),rgba(179,157,245,0.12));border-color:rgba(212,168,83,0.45);color:var(--gold2)}

/* VIEWS */
.view{display:none;animation:fup 0.4s cubic-bezier(.22,1,.36,1) both}
.view.active{display:block}
@keyframes fup{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

/* HERO */
.hero{padding:52px 0 38px;text-align:center}
.hero-t{font-family:'Playfair Display',serif;font-size:clamp(34px,6vw,60px);font-weight:300;line-height:1.1;letter-spacing:-2px;margin-bottom:10px}
.hero-t em{font-style:italic;background:linear-gradient(135deg,var(--gold),var(--gold2),var(--violet2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-s{font-size:13px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase}

/* FAB */
.fab{position:fixed;bottom:28px;right:28px;z-index:200;width:58px;height:58px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--gold),#b8782a);color:#09090f;font-size:26px;cursor:pointer;box-shadow:0 6px 28px rgba(212,168,83,0.55),0 0 0 1px rgba(212,168,83,0.3);transition:all 0.3s cubic-bezier(.22,1,.36,1);display:flex;align-items:center;justify-content:center;font-weight:300}
.fab:hover{transform:scale(1.12) rotate(90deg);box-shadow:0 10px 40px rgba(212,168,83,0.75),0 0 0 2px rgba(212,168,83,0.4)}
.fab:active{transform:scale(0.95)}

/* COUNTERS GRID */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(278px,1fr));gap:18px}

/* COUNTER CARD */
.ccard{position:relative;background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:24px;overflow:hidden;transition:transform 0.3s cubic-bezier(.22,1,.36,1),box-shadow 0.3s;animation:cin 0.5s cubic-bezier(.22,1,.36,1) both}
@keyframes cin{from{opacity:0;transform:scale(0.9) translateY(24px)}to{opacity:1;transform:scale(1) translateY(0)}}
.ccard::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% -10%,var(--cg,rgba(212,168,83,0.09)) 0%,transparent 60%);pointer-events:none;transition:opacity 0.3s}
.ccard:hover{transform:translateY(-5px);box-shadow:0 20px 56px rgba(0,0,0,0.55),0 0 0 1px var(--border2)}
.ccard:hover::before{opacity:1.5}

/* CARD TOP */
.ctop{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px}
.cew{position:relative;width:52px;height:52px}
.cring{position:absolute;inset:-4px;border-radius:50%;border:1.5px solid transparent;background:linear-gradient(var(--surface),var(--surface)) padding-box,linear-gradient(135deg,var(--ca,var(--gold)),rgba(139,111,232,0.4)) border-box;animation:sring 10s linear infinite}
@keyframes sring{to{transform:rotate(360deg)}}
.cemoji{position:relative;z-index:1;width:52px;height:52px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:25px}
.cacts{display:flex;gap:5px}
.cact{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.cact:hover{background:var(--surface2);color:var(--text);border-color:var(--border2)}
.cact.del:hover{background:rgba(224,96,122,0.1);color:var(--rose);border-color:rgba(224,96,122,0.3)}
.cname{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:5px;font-weight:500}

/* BIG NUMBER */
.cval{font-family:'Playfair Display',serif;font-size:66px;font-weight:300;letter-spacing:-3px;line-height:0.92;margin-bottom:10px;background:linear-gradient(175deg,var(--text) 50%,var(--text2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;will-change:transform}
.cval.gbump{animation:gbump 0.38s cubic-bezier(.22,1,.36,1)}
.cval.bbump{animation:bbump 0.38s cubic-bezier(.22,1,.36,1)}
@keyframes gbump{0%{transform:scale(1)}35%{transform:scale(1.14)}100%{transform:scale(1)}}
@keyframes bbump{0%{transform:scale(1)}35%{transform:scale(0.88)}100%{transform:scale(1)}}

/* STATUS PILL */
.spill{display:inline-flex;align-items:center;gap:5px;padding:3px 11px;border-radius:20px;font-size:11px;font-weight:500;letter-spacing:0.03em;margin-bottom:10px;border:1px solid transparent}
.spill.good{background:rgba(62,207,178,0.1);border-color:rgba(62,207,178,0.28);color:var(--teal)}
.spill.bad{background:rgba(224,96,122,0.1);border-color:rgba(224,96,122,0.28);color:var(--rose)}
.spill.neutral{background:rgba(154,150,180,0.08);border-color:rgba(154,150,180,0.18);color:var(--text3)}
.sdot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:pdot 1.8s ease-in-out infinite}
.ctoday{font-size:12px;color:var(--text3);margin-bottom:14px}
.ctoday strong{color:var(--text2)}

/* INC ROW */
.irow{display:flex;gap:6px;flex-wrap:wrap}
.ibtn{flex:1;min-width:0;height:40px;border-radius:10px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.ibtn:hover{background:linear-gradient(135deg,rgba(212,168,83,0.15),rgba(139,111,232,0.1));border-color:rgba(212,168,83,0.4);color:var(--gold2);transform:translateY(-1px)}
.ibtn:active{transform:translateY(0) scale(0.96)}
.ibtn.pi{background:linear-gradient(135deg,rgba(212,168,83,0.18),rgba(139,111,232,0.12));border-color:rgba(212,168,83,0.45);color:var(--gold2)}
.ubtn{width:40px;height:40px;flex-shrink:0;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.18s}
.ubtn:hover{background:var(--surface2);color:var(--text);border-color:var(--border2)}

/* RIPPLE */
.rpl{position:absolute;border-radius:50%;transform:scale(0);animation:rplA 0.55s linear;background:rgba(255,255,255,0.15);pointer-events:none}
@keyframes rplA{to{transform:scale(5);opacity:0}}

/* FLOAT PARTICLE */
.fp{position:fixed;pointer-events:none;z-index:1000;font-weight:600;font-size:17px;color:var(--gold2);text-shadow:0 0 12px var(--gold);animation:fpa 0.9s cubic-bezier(.22,1,.36,1) forwards}
.fp.bad{color:var(--rose);text-shadow:0 0 12px var(--rose)}
@keyframes fpa{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(0.5)}}

/* SECTION */
.shtop{padding:44px 0 26px}
.stitle{font-family:'Playfair Display',serif;font-size:30px;font-weight:300;letter-spacing:-0.8px;margin-bottom:4px}
.stitle em{font-style:italic;color:var(--violet2)}
.ssub{font-size:11px;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:26px}

/* METRICS */
.mrow{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:26px}
.mcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:18px 20px;position:relative;overflow:hidden;transition:transform 0.2s}
.mcard:hover{transform:translateY(-2px)}
.mcard::after{content:'';position:absolute;top:-40px;right:-30px;width:100px;height:100px;border-radius:50%;background:var(--mg,radial-gradient(circle,rgba(212,168,83,0.1),transparent));pointer-events:none}
.mlbl{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;font-weight:500}
.mval{font-family:'Playfair Display',serif;font-size:34px;font-weight:300;letter-spacing:-1.5px}
.msub{font-size:11px;color:var(--text3);margin-top:3px}

/* FILTER */
.fpills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
.fpill{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:12px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:5px}
.fpill:hover{border-color:var(--border2);color:var(--text2)}
.fpill.on{background:var(--surface2);border-color:var(--violet);color:var(--violet2)}

/* PATTERNS */
.prow{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:22px}
.pcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:16px;display:flex;align-items:center;gap:12px;transition:transform 0.2s}
.pcard:hover{transform:translateY(-2px)}
.pico{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.plbl{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);margin-bottom:3px}
.pval{font-size:13px;font-weight:500}

/* CHART BOX */
.cbox{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:28px;margin-bottom:18px;position:relative;overflow:hidden}
.cbox::before{content:'';position:absolute;top:-80px;right:-80px;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(139,111,232,0.05),transparent 70%);pointer-events:none}
.ctitle{font-family:'Playfair Display',serif;font-size:20px;font-weight:300;margin-bottom:3px}
.csub{font-size:11px;color:var(--text3);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:22px}

/* LOG */
.lbox{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.lhdr{padding:16px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase}
.lrow{display:flex;align-items:center;padding:11px 22px;border-bottom:1px solid var(--border);gap:12px;transition:background 0.15s}
.lrow:last-child{border-bottom:none}
.lrow:hover{background:var(--surface2)}
.lemoji{font-size:17px;width:26px;text-align:center}
.lname{flex:1;font-size:13px;color:var(--text2)}
.ldelta{font-size:13px;font-weight:500}
.ldelta.p{color:var(--teal)}
.ldelta.n{color:var(--rose)}
.ltime{font-size:11px;color:var(--text3)}

/* MODAL */
.mbd{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.78);backdrop-filter:blur(16px);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity 0.25s}
.mbd.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:24px;padding:32px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;position:relative;transform:scale(0.9) translateY(24px);transition:transform 0.3s cubic-bezier(.22,1,.36,1);box-shadow:0 30px 90px rgba(0,0,0,0.7)}
.mbd.open .modal{transform:scale(1) translateY(0)}
.modal::before{content:'';position:absolute;top:-50px;left:50%;transform:translateX(-50%);width:220px;height:110px;background:radial-gradient(ellipse,rgba(212,168,83,0.1),transparent 70%);pointer-events:none}
.mtitle{font-family:'Playfair Display',serif;font-size:26px;font-weight:300;margin-bottom:24px}
.flbl{display:block;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:6px;font-weight:500}
.fin{width:100%;padding:11px 14px;border:1px solid var(--border2);border-radius:11px;background:var(--bg3);color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s,box-shadow 0.2s;margin-bottom:18px}
.fin:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,168,83,0.12)}

/* EMOJI GRID */
.egrid{display:grid;grid-template-columns:repeat(9,1fr);gap:3px;max-height:160px;overflow-y:auto;margin-bottom:18px}
.ebtn{height:36px;border-radius:8px;border:1.5px solid transparent;background:transparent;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.12s}
.ebtn:hover{background:var(--surface2);transform:scale(1.18)}
.ebtn.sel{border-color:var(--gold);background:rgba(212,168,83,0.12);transform:scale(1.1)}

/* INCREMENTS */
.ipills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.ipill{padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--surface2);font-size:12px;color:var(--text);display:flex;align-items:center;gap:5px}
.ipill.on{background:linear-gradient(135deg,rgba(212,168,83,0.18),rgba(139,111,232,0.12));border-color:rgba(212,168,83,0.45);color:var(--gold2)}
.ipill .rx{font-size:12px;opacity:0.5;background:none;border:none;cursor:pointer;color:inherit;padding:0;line-height:1;transition:opacity 0.1s}
.ipill .rx:hover{opacity:1}
.airow{display:flex;gap:6px;margin-bottom:18px}
.aiin{flex:1;padding:9px 12px;border:1px solid var(--border2);border-radius:10px;background:var(--bg3);color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;outline:none;transition:border-color 0.2s}
.aiin:focus{border-color:var(--gold)}
.aigo{padding:9px 18px;border-radius:10px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;cursor:pointer;transition:all 0.18s;font-weight:500}
.aigo:hover{background:var(--gold);color:#09090f;border-color:var(--gold)}

/* DIR TOGGLE */
.dtoggle{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:22px}
.dopt{padding:14px 12px;border-radius:14px;border:1.5px solid var(--border);background:transparent;cursor:pointer;transition:all 0.22s;text-align:center}
.dopt:hover{border-color:var(--border2)}
.dopt.gsel{border-color:rgba(62,207,178,0.5);background:rgba(62,207,178,0.07)}
.dopt.bsel{border-color:rgba(224,96,122,0.5);background:rgba(224,96,122,0.07)}
.dico{font-size:22px;margin-bottom:5px}
.dlbl{font-size:13px;font-weight:500;margin-bottom:2px}
.dsub{font-size:10px;color:var(--text3);letter-spacing:0.04em}

/* MODAL ACTIONS */
.macts{display:flex;gap:8px}
.bcancel{flex:1;height:44px;border-radius:12px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-family:'Outfit',sans-serif;font-size:14px;cursor:pointer;transition:all 0.18s}
.bcancel:hover{background:var(--surface2);color:var(--text)}
.bsave{flex:2;height:44px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--gold),#b8782a);color:#09090f;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.22s;box-shadow:0 4px 20px rgba(212,168,83,0.3)}
.bsave:hover{transform:translateY(-1px);box-shadow:0 8px 32px rgba(212,168,83,0.5)}

/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--surface2);color:var(--text);border:1px solid var(--border2);padding:10px 24px;border-radius:30px;font-size:13px;font-weight:500;z-index:500;transition:transform 0.3s cubic-bezier(.22,1,.36,1);white-space:nowrap;pointer-events:none;box-shadow:0 10px 36px rgba(0,0,0,0.5)}
.toast.show{transform:translateX(-50%) translateY(0)}

/* EMPTY */
.empty{text-align:center;padding:80px 20px;grid-column:1/-1}
.eico{font-size:54px;margin-bottom:16px}
.etitle{font-family:'Playfair Display',serif;font-size:26px;font-weight:300;color:var(--text2);margin-bottom:8px}
.esub{font-size:14px;color:var(--text3)}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
</style>
</head>
<body>
<canvas id="bgc"></canvas>

<nav class="nav">
  <div class="brand"><div class="bdot"></div>aaaru</div>
  <div class="nav-tabs">
    <button class="ntab active" onclick="switchTab('counters',this)">Counters</button>
    <button class="ntab" onclick="switchTab('analytics',this)">Analytics</button>
  </div>
</nav>

<div class="wrap">
  <div class="view active" id="view-counters">
    <div class="hero">
      <div class="hero-t">Track what <em>matters.</em></div>
      <div class="hero-s">Your personal counting universe</div>
    </div>
    <div class="cgrid" id="cgrid"></div>
  </div>

  <div class="view" id="view-analytics">
    <div class="shtop">
      <div class="stitle">Weekly <em>Insight</em></div>
      <div class="ssub">Patterns &amp; trends from your counts</div>
    </div>
    <div class="mrow" id="ametrics"></div>
    <div class="fpills" id="afilt"></div>
    <div class="prow" id="apatterns"></div>
    <div class="cbox">
      <div class="ctitle">Daily activity</div>
      <div class="csub">Last 7 days &middot; counts per day</div>
      <div style="position:relative;height:260px"><canvas id="tChart" role="img" aria-label="Line chart daily counts 7 days">Daily counts.</canvas></div>
    </div>
    <div class="cbox">
      <div class="ctitle">All-time totals</div>
      <div class="csub">Distribution by counter</div>
      <div style="position:relative;height:220px"><canvas id="dChart" role="img" aria-label="Bar chart totals">Counter totals.</canvas></div>
    </div>
    <div class="lbox">
      <div class="lhdr"><span>Activity log</span><span id="lct"></span></div>
      <div id="llist"></div>
    </div>
  </div>
</div>

<button class="fab" onclick="openAdd()">+</button>

<!-- MODAL -->
<div class="mbd" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="mtitle" id="mtitle">New counter</div>
    <label class="flbl">Name</label>
    <input class="fin" id="iname" placeholder="Water glasses, Push-ups, Cigarettes…" maxlength="30">
    <label class="flbl">Pick an emoji</label>
    <div class="egrid" id="egrid"></div>
    <label class="flbl">Increment steps <span style="color:var(--text3);font-size:9px;text-transform:none;letter-spacing:0">&nbsp;decimals like 0.5, 2.5 work!</span></label>
    <div class="ipills" id="ipills"></div>
    <div class="airow">
      <input class="aiin" id="iinc" type="number" placeholder="e.g. 0.5, 1, 10…" step="0.01" min="0.01">
      <button class="aigo" onclick="addInc()">+ Add</button>
    </div>
    <label class="flbl">More of this is…</label>
    <div class="dtoggle">
      <div class="dopt gsel" id="dg" onclick="selDir('good')">
        <div class="dico">✨</div>
        <div class="dlbl" style="color:var(--teal)">Good</div>
        <div class="dsub">Higher = better</div>
      </div>
      <div class="dopt" id="db" onclick="selDir('bad')">
        <div class="dico">⚠️</div>
        <div class="dlbl" style="color:var(--rose)">Bad</div>
        <div class="dsub">Higher = worse</div>
      </div>
    </div>
    <div class="macts">
      <button class="bcancel" onclick="closeModal()">Cancel</button>
      <button class="bsave" onclick="saveCounter()">Save counter</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// BG PARTICLES
const bc=document.getElementById('bgc');
const bx=bc.getContext('2d');
let pts=[];
function resB(){bc.width=innerWidth;bc.height=innerHeight}
resB();addEventListener('resize',resB);
const pCols=['rgba(212,168,83,','rgba(139,111,232,','rgba(62,207,178,','rgba(224,96,122,'];
for(let i=0;i<60;i++) pts.push({
  x:Math.random()*innerWidth,y:Math.random()*innerHeight,
  r:Math.random()*1.6+0.3,
  vx:(Math.random()-0.5)*0.12,vy:(Math.random()-0.5)*0.12,
  o:Math.random()*0.45+0.1,
  c:pCols[Math.floor(Math.random()*4)]
});
(function drawBg(){
  bx.clearRect(0,0,bc.width,bc.height);
  pts.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0)p.x=bc.width;if(p.x>bc.width)p.x=0;
    if(p.y<0)p.y=bc.height;if(p.y>bc.height)p.y=0;
    bx.beginPath();bx.arc(p.x,p.y,p.r,0,Math.PI*2);
    bx.fillStyle=p.c+p.o+')';bx.fill();
  });
  for(let i=0;i<pts.length;i++) for(let j=i+1;j<pts.length;j++){
    const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<110){bx.beginPath();bx.moveTo(pts[i].x,pts[i].y);bx.lineTo(pts[j].x,pts[j].y);bx.strokeStyle=`rgba(255,255,255,${0.025*(1-d/110)})`;bx.lineWidth=0.5;bx.stroke()}
  }
  requestAnimationFrame(drawBg);
})();

// STATE
const EMOJIS=['🎯','💧','🏃','📚','💊','☕','🍎','💪','🧘','✍️','🎵','🌙','⚡','🔥','🌟','🎨','🧠','❤️','🌿','🍵','🥗','🛌','🚴','🏊','🎮','🍫','🔔','📊','🚬','🥤','🍺','💉','🧪','🦷','😴','🌊','🏆','🎁','🦾','🚀','🌸','💎','🧩','🎲','⏰','🔑','🌈','🍀','🐾','🌺'];
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const GCS=[
  {cg:'rgba(212,168,83,0.1)',ca:'var(--gold)'},
  {cg:'rgba(62,207,178,0.1)',ca:'var(--teal)'},
  {cg:'rgba(139,111,232,0.1)',ca:'var(--violet)'},
  {cg:'rgba(224,96,122,0.1)',ca:'var(--rose)'},
];
let S={counters:[],log:[]};
let editId=null,sEmoji='🎯',sIncs=[1,5],sDir='good',afilt='all';
let tChart=null,dChart=null;

function td(){return new Date().toISOString().slice(0,10)}
function d7(){const o=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);o.push(d.toISOString().slice(0,10))}return o}
function fmt(n){if(n===undefined||n===null)return'0';const r=parseFloat(n.toFixed(8));return Number.isInteger(r)?r.toString():r.toString()}

// TABS
function switchTab(v,btn){
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.ntab').forEach(x=>x.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  btn.classList.add('active');
  if(v==='analytics') renderAnalytics();
}

// RIPPLE
function ripple(btn,e){
  const r=document.createElement('span');
  r.className='rpl';
  const rect=btn.getBoundingClientRect();
  const sz=Math.max(rect.width,rect.height);
  r.style.cssText=`width:${sz}px;height:${sz}px;left:${e.clientX-rect.left-sz/2}px;top:${e.clientY-rect.top-sz/2}px`;
  btn.appendChild(r);r.addEventListener('animationend',()=>r.remove());
}

// FLOAT PARTICLE
function floatP(e,txt,bad){
  const p=document.createElement('div');
  p.className='fp'+(bad?' bad':'');p.textContent=txt;
  p.style.cssText=`left:${e.clientX-20}px;top:${e.clientY-14}px`;
  document.body.appendChild(p);
  p.addEventListener('animationend',()=>p.remove());
}

// STATUS
function getStatus(c){
  const v=c.value,d=c.dir||'good';
  if(v===0)return{cls:'neutral',lbl:'Starting'};
  if(d==='good'){
    if(v>=50)return{cls:'good',lbl:'Legendary'};
    if(v>=20)return{cls:'good',lbl:'Excellent'};
    if(v>=10)return{cls:'good',lbl:'Great'};
    if(v>=3)return{cls:'good',lbl:'Good'};
    return{cls:'neutral',lbl:'Started'};
  } else {
    if(v>=50)return{cls:'bad',lbl:'Critical'};
    if(v>=20)return{cls:'bad',lbl:'Concerning'};
    if(v>=10)return{cls:'bad',lbl:'Elevated'};
    if(v>=3)return{cls:'bad',lbl:'Noted'};
    return{cls:'neutral',lbl:'Minimal'};
  }
}

// RENDER COUNTERS
function renderCounters(){
  const g=document.getElementById('cgrid');g.innerHTML='';
  if(!S.counters.length){
    g.innerHTML=`<div class="empty"><div class="eico">✨</div><div class="etitle">Nothing counted yet</div><div class="esub">Hit the + to create your first counter</div></div>`;
    return;
  }
  S.counters.forEach((c,ci)=>{
    const todayV=(c.daily&&c.daily[td()])||0;
    const incs=c.increments||[1];
    const st=getStatus(c);
    const gc=GCS[ci%4];
    const card=document.createElement('div');
    card.className='ccard';
    card.style.cssText=`animation-delay:${ci*0.06}s;--cg:${gc.cg};--ca:${gc.ca}`;
    card.innerHTML=`
      <div class="ctop">
        <div class="cew"><div class="cring" style="--ca:${gc.ca}"></div><div class="cemoji">${c.emoji}</div></div>
        <div class="cacts">
          <button class="cact" onclick="openEdit('${c.id}')">✏</button>
          <button class="cact del" onclick="delC('${c.id}')">✕</button>
        </div>
      </div>
      <div class="cname">${esc(c.name)}</div>
      <div class="cval" id="v${c.id}">${fmt(c.value)}</div>
      <div class="spill ${st.cls}">${st.cls!=='neutral'?'<div class="sdot"></div>':''}${st.lbl}</div>
      <div class="ctoday">Today <strong>+${fmt(todayV)}</strong></div>
      <div class="irow">
        ${incs.slice(0,3).map((inc,ii)=>`<button class="ibtn${ii===0?' pi':''}" onclick="doInc(event,'${c.id}',${inc})">+${fmt(inc)}</button>`).join('')}
        <button class="ubtn" onclick="doUndo(event,'${c.id}')">↩</button>
      </div>`;
    g.appendChild(card);
  });
}

// INCREMENT
function doInc(e,id,amount){
  ripple(e.currentTarget,e);
  const c=S.counters.find(x=>x.id===id);if(!c)return;
  c.value=parseFloat((c.value+amount).toFixed(8));
  const t=td();if(!c.daily)c.daily={};
  c.daily[t]=parseFloat(((c.daily[t]||0)+amount).toFixed(8));
  S.log.unshift({id,name:c.name,emoji:c.emoji,delta:amount,ts:Date.now()});
  if(S.log.length>300)S.log=S.log.slice(0,300);
  save();
  const el=document.getElementById('v'+id);
  if(el){el.textContent=fmt(c.value);el.classList.remove('gbump','bbump');void el.offsetWidth;el.classList.add(c.dir==='bad'?'bbump':'gbump')}
  floatP(e,'+'+fmt(amount),c.dir==='bad');
  renderCounters();
  showToast(`${c.emoji} ${c.dir==='bad'?'⚠️':'✓'} +${fmt(amount)}`);
}

function doUndo(e,id){
  ripple(e.currentTarget,e);
  const c=S.counters.find(x=>x.id===id);if(!c||c.value<=0)return;
  const last=S.log.find(l=>l.id===id&&l.delta>0);
  const amt=last?last.delta:(c.increments&&c.increments[0])||1;
  c.value=parseFloat(Math.max(0,c.value-amt).toFixed(8));
  const t=td();if(!c.daily)c.daily={};
  c.daily[t]=parseFloat(Math.max(0,(c.daily[t]||0)-amt).toFixed(8));
  if(last)S.log=S.log.filter(l=>l!==last);
  S.log.unshift({id,name:c.name,emoji:c.emoji,delta:-amt,ts:Date.now()});
  save();renderCounters();showToast('↩ Undone');
}

function delC(id){
  if(!confirm('Delete this counter?'))return;
  S.counters=S.counters.filter(c=>c.id!==id);
  S.log=S.log.filter(l=>l.id!==id);
  save();renderCounters();showToast('Deleted');
}

// MODAL
function openAdd(){
  editId=null;sEmoji='🎯';sIncs=[1,5];sDir='good';
  document.getElementById('iname').value='';
  document.getElementById('mtitle').textContent='New counter';
  buildEgrid();buildIpills();buildDir();
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('iname').focus(),250);
}
function openEdit(id){
  const c=S.counters.find(x=>x.id===id);if(!c)return;
  editId=id;sEmoji=c.emoji;sIncs=[...(c.increments||[1])];sDir=c.dir||'good';
  document.getElementById('iname').value=c.name;
  document.getElementById('mtitle').textContent='Edit counter';
  buildEgrid();buildIpills();buildDir();
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open')}

function buildEgrid(){
  document.getElementById('egrid').innerHTML=EMOJIS.map(e=>`<button class="ebtn${e===sEmoji?' sel':''}" onclick="pickE('${e}')">${e}</button>`).join('');
}
function pickE(e){sEmoji=e;buildEgrid()}

function buildIpills(){
  document.getElementById('ipills').innerHTML=sIncs.map(i=>`
    <div class="ipill on">+${fmt(i)}<button class="rx" onclick="remInc(${i})">×</button></div>`).join('');
}
function addInc(){
  const v=parseFloat(parseFloat(document.getElementById('iinc').value).toFixed(8));
  if(isNaN(v)||v<=0||v>99999){showToast('Enter a valid number');return}
  if(sIncs.includes(v)){showToast('Already added');return}
  if(sIncs.length>=5){showToast('Max 5 increments');return}
  sIncs.push(v);sIncs.sort((a,b)=>a-b);
  document.getElementById('iinc').value='';buildIpills();
}
function remInc(v){sIncs=sIncs.filter(x=>x!==v);if(!sIncs.length)sIncs=[1];buildIpills()}

function buildDir(){
  document.getElementById('dg').className='dopt'+(sDir==='good'?' gsel':'');
  document.getElementById('db').className='dopt'+(sDir==='bad'?' bsel':'');
}
function selDir(d){sDir=d;buildDir()}

function saveCounter(){
  const name=document.getElementById('iname').value.trim();
  if(!name){showToast('Add a name!');return}
  if(editId){
    const c=S.counters.find(x=>x.id===editId);
    c.name=name;c.emoji=sEmoji;c.increments=sIncs;c.dir=sDir;
  } else {
    S.counters.push({id:'c'+Date.now(),name,emoji:sEmoji,value:0,increments:sIncs,dir:sDir,daily:{},createdAt:Date.now()});
  }
  save();closeModal();renderCounters();showToast(editId?'Updated ✓':'Created ✨');
}

// ANALYTICS
function renderAnalytics(){
  const wk=d7();
  const allT=S.counters.reduce((s,c)=>s+c.value,0);
  const todayT=S.counters.reduce((s,c)=>s+((c.daily&&c.daily[td()])||0),0);
  const weekT=S.counters.reduce((s,c)=>s+wk.reduce((a,d)=>a+((c.daily&&c.daily[d])||0),0),0);
  const str=calcStreak();

  document.getElementById('ametrics').innerHTML=[
    {lbl:'All-time',val:fmt(allT),sub:S.counters.length+' counters',mg:'rgba(212,168,83,0.1)'},
    {lbl:'Today',val:fmt(todayT),sub:new Date().toLocaleDateString('en',{weekday:'long'}),mg:'rgba(62,207,178,0.1)'},
    {lbl:'This week',val:fmt(weekT),sub:'Last 7 days',mg:'rgba(139,111,232,0.1)'},
    {lbl:'Streak',val:str+'d',sub:'Days active',mg:'rgba(224,96,122,0.1)'},
  ].map(m=>`<div class="mcard" style="--mg:radial-gradient(circle,${m.mg},transparent)">
    <div class="mlbl">${m.lbl}</div><div class="mval">${m.val}</div><div class="msub">${m.sub}</div></div>`).join('');

  document.getElementById('afilt').innerHTML=
    `<div class="fpill${afilt==='all'?' on':''}" onclick="setFilt('all')">All</div>`+
    S.counters.map(c=>`<div class="fpill${afilt===c.id?' on':''}" onclick="setFilt('${c.id}')">${c.emoji} ${esc(c.name)}</div>`).join('');

  renderPatt(wk);

  const filt=afilt==='all'?S.counters:S.counters.filter(c=>c.id===afilt);
  const tData=wk.map(d=>filt.reduce((s,c)=>s+((c.daily&&c.daily[d])||0),0));
  const tLbls=wk.map(d=>DAYS[new Date(d+'T12:00:00').getDay()]);

  if(tChart)tChart.destroy();
  tChart=new Chart(document.getElementById('tChart'),{
    type:'line',data:{labels:tLbls,datasets:[{label:'Counts',data:tData,borderColor:'#d4a853',backgroundColor:'rgba(212,168,83,0.07)',borderWidth:2.5,pointBackgroundColor:'#d4a853',pointBorderColor:'#09090f',pointBorderWidth:2,pointRadius:5,pointHoverRadius:8,fill:true,tension:0.42}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'#1c1c2e',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,titleColor:'#f0eef8',bodyColor:'#9a96b4',padding:12,cornerRadius:12}},scales:{x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#5a5770',font:{family:'Outfit',size:12}}},y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#5a5770',font:{family:'Outfit',size:12},precision:0},beginAtZero:true}}}
  });

  if(dChart)dChart.destroy();
  const bc=['#d4a853','#3ecfb2','#8b6fe8','#e0607a','#5bafd6','#7db87d'];
  if(S.counters.length){
    dChart=new Chart(document.getElementById('dChart'),{
      type:'bar',data:{labels:S.counters.map(c=>c.emoji+' '+c.name),datasets:[{label:'Total',data:S.counters.map(c=>c.value),backgroundColor:S.counters.map((_,i)=>bc[i%bc.length]+'99'),borderColor:S.counters.map((_,i)=>bc[i%bc.length]),borderWidth:1.5,borderRadius:8}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'#1c1c2e',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,titleColor:'#f0eef8',bodyColor:'#9a96b4',padding:12,cornerRadius:12}},scales:{x:{grid:{display:false},ticks:{color:'#5a5770',font:{family:'Outfit',size:11},maxRotation:35}},y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#5a5770',font:{family:'Outfit',size:12},precision:0},beginAtZero:true}}}
    });
  }

  const rec=S.log.slice(0,40);
  document.getElementById('lct').textContent=rec.length+' entries';
  document.getElementById('llist').innerHTML=rec.length===0
    ?`<div class="lrow" style="color:var(--text3);justify-content:center">No activity yet</div>`
    :rec.map(l=>`<div class="lrow"><div class="lemoji">${l.emoji}</div><div class="lname">${esc(l.name)}</div><div class="ldelta ${l.delta>=0?'p':'n'}">${l.delta>=0?'+':''}${fmt(l.delta)}</div><div class="ltime">${tAgo(l.ts)}</div></div>`).join('');
}

function renderPatt(wk){
  if(!S.counters.length){document.getElementById('apatterns').innerHTML='';return}
  const dTots=wk.map(d=>({lbl:DAYS[new Date(d+'T12:00:00').getDay()],v:S.counters.reduce((s,c)=>s+((c.daily&&c.daily[d])||0),0)}));
  const best=dTots.reduce((a,b)=>b.v>a.v?b:a);
  const mac=S.counters.reduce((a,b)=>{
    const aw=wk.reduce((s,d)=>s+((a.daily&&a.daily[d])||0),0);
    const bw=wk.reduce((s,d)=>s+((b.daily&&b.daily[d])||0),0);
    return bw>aw?b:a;
  });
  const macW=wk.reduce((s,d)=>s+((mac.daily&&mac.daily[d])||0),0);
  const avgs=dTots.map(x=>x.v);
  const avg=(avgs.reduce((a,b)=>a+b,0)/7).toFixed(1);
  const f3=avgs.slice(0,3).reduce((a,b)=>a+b,0)/3;
  const l3=avgs.slice(4).reduce((a,b)=>a+b,0)/3;
  const tr=l3>f3?'↑ Rising':l3<f3?'↓ Declining':'→ Steady';
  const tc=l3>f3?'var(--teal)':l3<f3?'var(--rose)':'var(--text2)';

  document.getElementById('apatterns').innerHTML=[
    {ico:'🏆',bg:'rgba(212,168,83,0.1)',lbl:'Best day',val:`${best.lbl} — ${fmt(best.v)}`},
    {ico:mac.emoji,bg:'rgba(62,207,178,0.08)',lbl:'Most active',val:`${esc(mac.name)} (${fmt(macW)} this wk)`},
    {ico:'📈',bg:'rgba(139,111,232,0.08)',lbl:'Trend',val:`<span style="color:${tc}">${tr}</span>`},
    {ico:'⏱',bg:'rgba(224,96,122,0.08)',lbl:'Daily avg',val:`${avg} / day`},
  ].map(p=>`<div class="pcard"><div class="pico" style="background:${p.bg}">${p.ico}</div><div><div class="plbl">${p.lbl}</div><div class="pval">${p.val}</div></div></div>`).join('');
}

function setFilt(id){afilt=id;renderAnalytics()}
function calcStreak(){
  if(!S.counters.length)return 0;let s=0;const d=new Date();
  for(let i=0;i<365;i++){
    const k=d.toISOString().slice(0,10);
    if(!S.counters.some(c=>c.daily&&(c.daily[k]||0)>0))break;
    s++;d.setDate(d.getDate()-1);
  }
  return s;
}
function tAgo(ts){
  const m=Math.floor((Date.now()-ts)/60000);
  if(m<1)return'just now';if(m<60)return m+'m ago';
  const h=Math.floor(m/60);if(h<24)return h+'h ago';
  return Math.floor(h/24)+'d ago';
}
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1900);
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeModal();
  if(e.key==='Enter'&&document.getElementById('modal').classList.contains('open')){
    if(document.activeElement.id==='iinc')addInc();else saveCounter();
  }
});
</script>
